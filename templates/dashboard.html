<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Intelix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Arial, sans-serif;
            background: #0F0F0F;
            color: #FFFFFF;
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 24px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -1px;
        }

        .nav-right {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-right a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            transition: color 0.3s;
        }

        .nav-right a:hover {
            color: #FFFFFF;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 140px 40px 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 16px;
            letter-spacing: -2px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 19px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
        }

        .validator-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
        }

        .form-group .label-optional {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 8px;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: #6366F1;
        }

        textarea::placeholder, input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .helper-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.4);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            nav {
                padding: 20px 24px;
            }

            .container {
                padding: 120px 24px 60px;
            }

            .header h1 {
                font-size: 42px;
            }

            .validator-box {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Intelix</div>
        <div class="nav-right">
            <a href="/validations">History</a>
            <a href="/settings">Settings</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Validate Your <span class="gradient-text">Idea</span></h1>
            <p>Get AI-powered insights and marketing strategies for your business concept</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number">{{ validation_count }}</div>
                <div class="stat-label">Ideas Validated</div>
            </div>
        </div>

        <div class="validator-box">
            <form action="/analyze" method="POST">
                <div class="form-group">
                    <label for="idea">Your Business Idea</label>
                    <textarea 
                        id="idea" 
                        name="idea" 
                        placeholder="Example: A mobile app that helps busy professionals track their daily water intake with smart reminders and hydration goals based on their activity level..."
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="business_name">
                        Business/Product Name
                        <span class="label-optional">(Optional)</span>
                    </label>
                    <input 
                        type="text" 
                        id="business_name" 
                        name="business_name" 
                        placeholder="e.g., HydroTrack, WaterWise, AquaFlow..."
                    />
                    <div class="helper-text">
                        If provided, your marketing posts will mention your brand name. Leave empty for generic posts.
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    Analyze My Idea →
                </button>
            </form>
        </div>
    </div>
</body>
</html>
