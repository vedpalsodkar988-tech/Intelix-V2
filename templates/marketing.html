<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7B8EWD6CEG"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Campaign - Intelix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Arial, sans-serif;
            background: #0F0F0F;
            color: #FFFFFF;
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 24px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -1px;
        }

        .nav-right {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-right a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            transition: color 0.3s;
        }

        .nav-right a:hover {
            color: #FFFFFF;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 40px 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 12px;
            letter-spacing: -2px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
        }

        .idea-summary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 50px;
        }

        .idea-summary h3 {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .idea-summary p {
            font-size: 17px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Section Headers */
        .section-header {
            text-align: center;
            margin: 60px 0 40px;
        }

        .section-header h2 {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .section-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        /* LinkedIn Posts Section */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 28px;
            margin-bottom: 80px;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            transition: all 0.3s;
        }

        .post-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-4px);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .post-title {
            font-size: 16px;
            font-weight: 700;
            color: #6366F1;
        }

        .post-badge {
            background: rgba(99, 102, 241, 0.2);
            color: #A855F7;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .post-content {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            line-height: 1.7;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            white-space: pre-wrap;
        }

        .post-actions {
            display: flex;
            gap: 12px;
        }

        .btn-copy {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Reel Scripts Section */
        .reels-grid {
            display: grid;
            gap: 32px;
            margin-bottom: 80px;
        }

        .reel-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            transition: all 0.3s;
        }

        .reel-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .reel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .reel-title {
            font-size: 24px;
            font-weight: 700;
            color: #FFFFFF;
        }

        .reel-badge {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .reel-script {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            white-space: pre-wrap;
        }

        .voiceover-section {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(239, 68, 68, 0.1) 100%);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .voiceover-section h4 {
            font-size: 14px;
            color: #f59e0b;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .audio-player {
            width: 100%;
            margin-bottom: 12px;
        }

        .download-audio {
            display: inline-block;
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .download-audio:hover {
            background: rgba(245, 158, 11, 0.3);
        }

        .reel-actions {
            display: flex;
            gap: 12px;
        }

        .btn-copy-script {
            flex: 1;
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-copy-script:hover {
            background: rgba(245, 158, 11, 0.3);
        }

        .hidden-textarea {
            position: absolute;
            left: -9999px;
        }

        .back-link {
            text-align: center;
            margin-top: 40px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 15px;
        }

        .back-link a:hover {
            color: #FFFFFF;
        }

        @media (max-width: 768px) {
            nav {
                padding: 20px 24px;
            }

            .container {
                padding: 100px 24px 60px;
            }

            .header h1 {
                font-size: 36px;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Intelix</div>
        <div class="nav-right">
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Your <span class="gradient-text">Marketing Content</span></h1>
            <p>AI-generated posts and voiceovers ready to launch</p>
        </div>
