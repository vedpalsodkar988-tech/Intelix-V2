<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validate Your Idea - Intelix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Arial, sans-serif;
            background: #0F0F0F;
            color: #FFFFFF;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }
        .orb-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #6366F1, #A855F7);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #EC4899, #F59E0B);
            bottom: -100px;
            right: -100px;
            animation-delay: 5s;
        }
        .orb-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #10B981, #3B82F6);
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, -50px) scale(1.1); }
            66% { transform: translate(-50px, 100px) scale(0.9); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 24px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366F1 0%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 140px 60px 100px;
            position: relative;
            z-index: 1;
        }
        .welcome-banner {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .welcome-text h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .welcome-text p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
        }
        .validation-badge {
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
        }
        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        .header h1 {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 16px;
            letter-spacing: -2px;
        }
        .gradient-text {
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            margin: 0 auto;
        }
        .form-card {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px;
            backdrop-filter: blur(20px);
        }
        .form-group {
            margin-bottom: 28px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
        }
        .form-group textarea,
        .form-group input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 16px;
            color: #FFFFFF;
            font-family: inherit;
            transition: all 0.3s;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 140px;
        }
        .form-group textarea:focus,
        .form-group input:focus {
            outline: none;
            border-color: #6366F1;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .form-group textarea::placeholder,
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .helper-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
        }
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        @media (max-width: 768px) {
            nav {
                padding: 20px 24px;
            }
            .container {
                padding: 100px 24px 60px;
            }
            .welcome-banner {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
            .header h1 {
                font-size: 36px;
            }
            .form-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    <nav>
        <div class="logo">Intelix</div>
    </nav>
    <div class="container">
        <div class="welcome-banner">
            <div class="welcome-text">
                <h2>👋 Welcome!</h2>
                <p>Start validating your business ideas with AI</p>
            </div>
            <div class="validation-badge">
                0/2 Free Validations
            </div>
        </div>
        
        <div class="header">
            <h1>Validate Your <span class="gradient-text">Business Idea</span></h1>
            <p>Get instant AI validation + ready-to-post LinkedIn content</p>
        </div>
        
        <form action="/analyze" method="POST" class="form-card">
            <div class="form-group">
                <label for="idea">Describe Your Business Idea *</label>
                <textarea 
                    id="idea" 
                    name="idea" 
                    required
                    placeholder="e.g., AI-powered project management tool that automatically assigns tasks based on team member skills and workload..."
                ></textarea>
                <p class="helper-text">Be specific about what problem you're solving and who it's for</p>
            </div>
            <div class="form-group">
                <label for="business_name">Business/Product Name (Optional)</label>
                <input 
                    type="text" 
                    id="business_name" 
                    name="business_name" 
                    placeholder="e.g., TechFlow, CloudSync, MarketIQ, FitTrack"
                >
                <p class="helper-text">Give your idea a name to personalize the analysis</p>
            </div>
            <button type="submit" class="btn-submit">
                Validate My Idea 🚀
            </button>
        </form>
    </div>
    
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = document.querySelector('.btn-submit');
            btn.disabled = true;
            btn.innerHTML = `
                <span style="display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle;"></span>
                Validating...
            `;
        });
    </script>
</body>
</html>
